<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DSL Planeamento — Cork Supply</title>
<style>
:root{
  --c-bg:#f4f7f1; --c-panel:#fff; --c-ink:#21301f; --c-muted:#6b7a66;
  --c-line:#d8e2d2; --c-primary:#3d6b3f; --c-primary-dark:#2a4f2c; --c-accent:#c8a97e;
  --c-now:#c2410c; --c-warn:#b91c1c; --c-ok:#15803d;
  --r:8px; --sh:0 1px 3px rgba(0,0,0,.08);
  --est-pool:#D9D9D9; --est-plan:#86C47A; --est-trans:#e6cfa8;
  --est-proc:#FFA500; --est-term:#00B050; --est-concl:#00B0F0; --est-csp:#FFFF00;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",system-ui,Arial,sans-serif;background:var(--c-bg);color:var(--c-ink);font-size:13px}
header{display:flex;align-items:center;gap:14px;padding:9px 16px;background:var(--c-primary);color:#fff}
header .brand{font-weight:700;font-size:16px;letter-spacing:.3px}
header .brand small{font-weight:400;opacity:.8;font-size:11px;display:block}
header .spacer{flex:1}
header .tools{display:flex;align-items:center;gap:8px}
button{font-family:inherit;font-size:12px;border:none;border-radius:6px;padding:6px 11px;cursor:pointer;background:#eef3ea;color:var(--c-ink)}
button:hover{filter:brightness(.97)}
button.primary{background:var(--c-accent);color:#3a2c18;font-weight:600}
button.ghost{background:rgba(255,255,255,.15);color:#fff}
button.danger{background:#fde8e8;color:var(--c-warn)}
button:disabled{opacity:.4;cursor:not-allowed}
select,input,textarea{font-family:inherit;font-size:12px;border:1px solid var(--c-line);border-radius:6px;padding:5px 7px;background:#fff;color:var(--c-ink)}
.conn-chip{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.18);color:#fff}
.conn-chip.ok::before{content:"● ";color:#9ff09f}
.conn-chip.error::before{content:"● ";color:#ffb3b3}
.conn-chip.loading::before{content:"● ";color:#ffe08a}

.tabs{display:flex;gap:2px;padding:0 12px;background:var(--c-primary-dark)}
.tab{padding:9px 15px;color:#cfe0c9;cursor:pointer;font-size:12.5px;border-bottom:3px solid transparent;white-space:nowrap}
.tab:hover{color:#fff}
.tab.active{color:#fff;border-bottom-color:var(--c-accent);font-weight:600}
.tab .cnt{display:inline-block;background:rgba(255,255,255,.2);border-radius:10px;padding:0 6px;margin-left:5px;font-size:10px}

.weekbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#eaf0e6;border-bottom:1px solid var(--c-line)}
.weekbar .wk{font-weight:700;color:var(--c-primary-dark)}
.weekbar input.search{width:280px}
.weekbar .wknav{margin-left:auto;display:flex;align-items:center;gap:8px}
.weekbar .wknav .opcount{font-size:11px;color:var(--c-muted);white-space:nowrap}

.wrap{display:grid;grid-template-columns:260px 1fr;gap:0;height:calc(100vh - 150px)}
.wrap.full{grid-template-columns:1fr}
.pool{background:var(--c-panel);border-right:1px solid var(--c-line);overflow:auto;padding:8px}
.pool h3{margin:4px 6px 8px;font-size:12px;color:var(--c-muted);text-transform:uppercase;letter-spacing:.5px}
.pool .pool-sub{font-size:10.5px;color:var(--c-muted);margin:10px 6px 4px;border-top:1px dashed var(--c-line);padding-top:6px}
.board{overflow:auto;padding:10px 12px}

.card{background:#fff;border:1px solid var(--c-line);border-left:5px solid var(--est-plan);border-radius:6px;padding:6px 8px;margin-bottom:6px;cursor:grab;box-shadow:var(--sh)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.4}
.card .c-top{display:flex;justify-content:space-between;gap:6px;align-items:baseline}
.card .c-dsl{font-weight:700;font-size:12px}
.card .c-qtd{font-size:11px;color:var(--c-primary-dark);font-weight:600;white-space:nowrap}
.card .c-prod{font-size:10.5px;color:var(--c-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .c-meta{font-size:10px;color:var(--c-muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
.card .badge{font-size:9px;padding:1px 5px;border-radius:4px;background:#eef3ea}
.card .badge.desd{background:#fde9c7;color:#92560a}
.card .badge.urg{background:#fde8e8;color:var(--c-warn)}
.card[data-est="Aberto"]{border-left-color:#cfcfcf}
.card[data-est="Liberado"]{border-left-color:#00B050}
.card[data-est="Em Processo"]{border-left-color:#FFA500}
.card[data-est="Em Processo - Desdobrar"]{border-left-color:#ED7D31}
.card[data-est="Terminado"]{border-left-color:#E0218A}
.card[data-est="Concluído Planeamento"]{border-left-color:#92D050}

.day-block{margin-bottom:14px;border:1px solid var(--c-line);border-radius:var(--r);overflow:hidden;background:#fff;box-shadow:var(--sh)}
.line-block{margin-bottom:16px;border:1px solid var(--c-line);border-radius:var(--r);overflow:hidden;background:#fff;box-shadow:var(--sh)}
.line-block-head{padding:8px 12px;background:var(--c-primary);color:#fff;font-weight:700;font-size:13px;position:sticky;top:0;z-index:2}
.line-block.line-hl .line-block-head{background:#2f5d86}
.line-block.line-em .line-block-head{background:#5b2a86}
.line-block .line-zone .lz-head .d-date{font-weight:700;color:var(--c-primary-dark)}
.line-block .line-zone.fds-zone .lz-head{background:#efe7d6}
.day-head{display:flex;align-items:center;gap:10px;padding:6px 10px;background:var(--c-primary);color:#fff;position:sticky;top:0;z-index:2}
.day-head.fds{background:#7a6a52}
.day-head.closed{background:#9aa39a}
.day-head .d-date{font-weight:700}
.day-head .d-turno{font-size:11px;opacity:.9}
.day-head .spacer{flex:1}
.line-zone{border-top:1px solid var(--c-line)}
.line-zone .lz-head{display:flex;align-items:center;gap:8px;padding:3px 10px;background:#eef3ea;font-size:11px;font-weight:600;color:var(--c-primary-dark)}
.line-zone .lz-head .cap{font-weight:400;color:var(--c-muted)}
.line-zone .lz-head .turno-sel{margin-left:8px;font-size:10px;border:1px solid var(--c-line);border-radius:4px;padding:1px 3px;background:#fff}
.line-zone .lz-head .lz-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.line-zone .lz-head .lz-btn{font-size:10px;padding:1px 8px;background:#fdecec;color:#b91c1c;border:1px solid #f3c4c4;border-radius:4px;cursor:pointer}
.line-zone.lz-closed{opacity:.7}
.line-zone.lz-closed .lz-head{background:#f0e2e2;color:#7a2e2e}
.line-zone.drag-target{outline:2px dashed var(--c-accent);outline-offset:-3px;background:#fbf6ee}
.line-zone .empty{padding:6px 10px;color:#b7c2b1;font-size:11px;font-style:italic}

table.plan{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
table.plan td.prod-cell{white-space:normal;word-break:break-word;font-size:10px;line-height:1.25}
table.plan td{overflow:hidden;text-overflow:ellipsis}
table.plan th{background:#f0f4ec;color:var(--c-muted);font-weight:600;padding:3px 6px;text-align:left;border-bottom:1px solid var(--c-line);white-space:nowrap;font-size:10px}
table.plan td{padding:3px 6px;border-bottom:1px solid #eef2ea;vertical-align:middle}
table.plan tr.row:hover{background:#f7faf4}
table.plan tr.late{background:#fdecec}
table.plan tr.desd td{box-shadow:inset 3px 0 0 #f0a93a}
table.plan tr.search-hit td{background:#fff3bf!important}
table.plan tr.search-hit td:first-child{box-shadow:inset 4px 0 0 #e0a008}
.card.search-hit{outline:2px solid #e0a008;box-shadow:0 0 0 3px #ffe9a8}
.search-bar{position:sticky;top:0;z-index:3;background:#fffbe6;border:1px solid #f0d98c;border-radius:6px;padding:6px 10px;margin-bottom:10px;font-size:11.5px;color:#7a5b00;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.search-bar .mchip{background:#fff;border:1px solid #e3c97a;border-radius:12px;padding:2px 9px;cursor:pointer;color:#7a5b00}
.search-bar .mchip.cur{background:#f0d98c;font-weight:600}
.search-bar .mchip:hover{background:#f7e9b8}
/* destaque das linhas DSL-4 e DSL-5 */
.line-zone.line-hl .lz-head{background:#d8e9f7;color:#1c4f7a}
.line-zone.line-hl{box-shadow:inset 3px 0 0 #5b8fc4}
.line-zone.line-em .lz-head{background:#ece0f5;color:#5b2a86}
.line-zone.line-em{box-shadow:inset 3px 0 0 #8e5bbf}
.bt-sel{font-size:9.5px;margin-top:2px;border:1px solid var(--c-line);border-radius:4px;padding:1px 2px;background:#f3eee4}
.contflag{display:inline-block;margin-left:5px;font-size:9px;font-weight:600;color:#7a3b00;background:#ffe3c2;border-radius:4px;padding:0 5px}
table.plan tr.cont td{background:#fff8ef}
table.plan tr.day-start td{border-top:2px solid #c4d2bb}
table.plan td.dnew{font-weight:700;color:var(--c-primary-dark)}
.handle{cursor:grab;color:#bcc7b6;user-select:none;padding:0 2px}
.drop-above{box-shadow:inset 0 2px 0 var(--c-accent)}
.drop-below{box-shadow:inset 0 -2px 0 var(--c-accent)}
.est-sel{font-size:10px;border-radius:4px;padding:2px 4px;border:1px solid var(--c-line)}
.est-sel[data-est="Aberto"]{background:#fff;color:#21301f}
.est-sel[data-est="Liberado"]{background:#00B050;color:#fff}
.est-sel[data-est="Em Processo"]{background:#FFA500;color:#3a2c18}
.est-sel[data-est="Em Processo - Desdobrar"]{background:#ED7D31;color:#fff}
.est-sel[data-est="Terminado"]{background:#E0218A;color:#fff}
.est-sel[data-est="Concluído Planeamento"]{background:#92D050;color:#21301f}
.mini{font-size:10px;color:var(--c-muted)}
.tnum{font-variant-numeric:tabular-nums}

.cfg{padding:16px 22px;max-width:1100px}
.cfg h2{font-size:15px;color:var(--c-primary-dark);margin:18px 0 8px}
.cfg table{border-collapse:collapse;font-size:12px;margin-bottom:10px}
.cfg th,.cfg td{border:1px solid var(--c-line);padding:5px 8px;text-align:left}
.cfg th{background:#eef3ea}
.cfg input{width:90px}

.modal-bg{position:fixed;inset:0;background:rgba(20,30,18,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;overflow:auto;padding:30px 12px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:10px;width:760px;max-width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.modal h3{margin:0;padding:12px 16px;background:var(--c-primary);color:#fff;border-radius:10px 10px 0 0;font-size:14px}
.modal .body{padding:14px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 14px}
.fld{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.fld label{font-size:10.5px;color:var(--c-muted);font-weight:600}
.fld input,.fld select,.fld textarea{width:100%}
.sec-title{font-size:11px;font-weight:700;color:var(--c-primary-dark);margin:12px 0 4px;border-bottom:1px solid var(--c-line);padding-bottom:3px}
.modal .foot{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--c-line);justify-content:flex-end}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:6px 16px;font-size:10.5px;color:var(--c-muted);background:#eef3ea;border-bottom:1px solid var(--c-line)}
.toast{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:8px;color:#fff;font-size:13px;z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.25);display:none}
.toast.err{background:var(--c-warn)} .toast.ok{background:var(--c-ok)}
body.producao .planner-only{display:none!important}
</style>
</head>
<body>
<header>
  <div class="brand">DSL Planeamento <small>Cork Supply · Harv 81 Group</small></div>
  <div class="spacer"></div>
  <div class="tools">
    <span id="conn" class="conn-chip loading">a ligar…</span>
    <select id="profileSel" title="Perfil"><option value="producao">Produção</option><option value="planeador">Planeador</option></select>
    <button class="ghost planner-only" id="btnUndo" title="Anular última ação" disabled>↶ Anular</button>
    <button class="primary planner-only" id="btnNew">+ Nova ordem</button>
    <button class="ghost" id="btnExport">Exportar Excel</button>
    <button class="ghost planner-only" id="btnReset" title="Repor seed">↺</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>
<div class="legend" id="legend"></div>

<div class="weekbar" id="weekbar">
  <input class="search" id="search" placeholder="Pesquisar DSL, lote, cliente, produto…">
  <span class="wknav">
    <button id="wkPrev">◀</button>
    <span class="wk" id="wkLabel">—</span>
    <button id="wkNext">▶</button>
    <button id="wkToday">Hoje</button>
    <span class="opcount" id="opcount"></span>
  </span>
</div>

<div class="wrap" id="wrap">
  <div class="pool" id="pool"></div>
  <div class="board" id="board"></div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">Editar ordem</h3>
    <div class="body" id="modalBody"></div>
    <div class="foot">
      <button class="danger planner-only" id="btnDelete">Apagar</button>
      <div style="flex:1"></div>
      <button id="btnCancel">Cancelar</button>
      <button class="primary" id="btnSave">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
/* ============================================================
   Planeamento DSL — Frontend SPA
   ============================================================ */
const DIAS_PT=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
const MESES_PT=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const LINHAS_1_5=['1','2','3','4','5'];
const LINHAS_6_10=['6','7','8','9','10'];
const ESPECIAIS=['B','EE','T'];
const ESPECIAIS_LABEL={'B':'Banca','EE':'Escolha Eletrónica','T':'Tapete'};
// Etiquetas de apresentação das linhas (a chave interna mantém-se 1..10/B/EE/T)
const LINE_LABELS={'1':'EE - DSL 1','2':'EE - DSL 2','3':'EE - DSL 3','4':'DSL - 4','5':'DSL - 5','6':'EE - DSL 6','7':'EE - DSL 7','8':'EE - DSL 8','EM':'Escolha Manual'};
function lineLabel(l){return LINE_LABELS[l]||(ESPECIAIS.includes(l)?`${l} · ${ESPECIAIS_LABEL[l]}`:`Linha ${l}`);}
const ESTADOS=['Aberto','Liberado','Em Processo','Em Processo - Desdobrar','Terminado','Concluído Planeamento'];
const ESTADO_POOL='Aberto';
const PLANEADOR_PW='Cork2026!';

const ALL_LINES=['1','2','3','4','5','6','7','8','EM']; // EE-DSL 1..8 + Escolha Manual
const BOARDS={
  plan:{label:'Plano Dia · Todas as linhas', lines:ALL_LINES},
};

let DATA=[];
let SETTINGS={};
let ACTIVE_TAB='plan';
let ANCHOR=null;
let PROFILE=localStorage.getItem('dsl_profile')||'producao';
let editingId=null;
let dragOp=null;
const SEARCH={v:''};

/* ---------------- UNDO (só planeador) ---------------- */
let UNDO_STACK=[];const UNDO_MAX=25;
function snapshot(){UNDO_STACK.push(JSON.stringify(DATA));if(UNDO_STACK.length>UNDO_MAX)UNDO_STACK.shift();updateUndoBtn();}
function updateUndoBtn(){const b=document.getElementById('btnUndo');if(b)b.disabled=(UNDO_STACK.length===0)||isProd();}
async function doUndo(){
  if(isProd()||!UNDO_STACK.length)return;
  const prev=JSON.parse(UNDO_STACK.pop());
  const pMap={},cMap={};
  prev.forEach(o=>{if(o.id!=null)pMap[o.id]=o;});
  DATA.forEach(o=>{if(o.id!=null)cMap[o.id]=o;});
  const tasks=[];
  for(const id in pMap){if(!(id in cMap)){const o=Object.assign({},pMap[id]);delete o.id;tasks.push(Api.postOp(o));}}       // recriar apagadas
  for(const id in cMap){if(!(id in pMap)){tasks.push(Api.delOp(+id));}}                                                  // apagar criadas
  for(const id in pMap){if((id in cMap)&&JSON.stringify(pMap[id])!==JSON.stringify(cMap[id])){tasks.push(Api.putOp(+id,pMap[id]));}} // repor alteradas
  DATA=prev;updateUndoBtn();render();
  try{setConn('loading','a anular…');await Promise.all(tasks);setConn('ok','ligado');toast('Ação anulada.');await loadState();}
  catch(e){setConn('error','erro');toast('Falha ao anular: '+e.message,'err');}
}

/* ---------------- helpers tempo ---------------- */
const pad=n=>String(n).padStart(2,'0');
function mondayOf(d){const x=new Date(d);const w=(x.getDay()+6)%7;x.setDate(x.getDate()-w);x.setHours(0,0,0,0);return x;}
function isoWeek(d){const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-dn+3);const f=new Date(Date.UTC(t.getUTCFullYear(),0,4));return 1+Math.round(((t-f)/86400000-3+((f.getUTCDay()+6)%7))/7);}
function isoYear(d){const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-dn+3);return t.getUTCFullYear();}
function weekKeyOf(d){return `${isoYear(d)}-W${pad(isoWeek(d))}`;}
function dateOfWeekDay(monday,diaIdx){const x=new Date(monday);x.setDate(x.getDate()+diaIdx);return x;}
function dateKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function hm2min(s){if(!s||!/^\d{1,2}:\d{2}/.test(s))return null;const[a,b]=s.split(':');return(+a)*60+(+b);}
function min2hm(m){m=Math.round(m);const neg=m<0;m=Math.abs(m);return(neg?'-':'')+pad(Math.floor(m/60))+':'+pad(m%60);}
function calibreFrom(prod){const m=(prod||'').match(/(\d{2})[xX](\d{3})/);if(m)return m[1]+'x'+m[2];const m2=(prod||'').match(/(\d{2})[xX](\d{2})(?!\d)/);return m2?m2[1]+'x'+m2[2]+'0':'';}
function qualidadeFrom(prod){const m=(prod||'').match(/\d{2}[xX]\d{2,3}-(\d{3,4})/);return m?m[1]:'';}

/* ---------------- API ---------------- */
const Api={
  async getState(){const r=await fetch('/api/state');if(!r.ok)throw new Error('state '+r.status);return r.json();},
  async putOp(id,op){const r=await fetch('/api/ops/'+id,{method:'PUT',headers:{'Content-Type':'application/json','X-Profile':PROFILE},body:JSON.stringify(op)});const b=await r.json().catch(()=>({}));if(!r.ok||b.ok===false)throw new Error(b.error||'PUT '+r.status);return b.op;},
  async postOp(op){const r=await fetch('/api/ops',{method:'POST',headers:{'Content-Type':'application/json','X-Profile':PROFILE},body:JSON.stringify(op)});const b=await r.json().catch(()=>({}));if(!r.ok||b.ok===false)throw new Error(b.error||'POST '+r.status);return b.op;},
  async delOp(id){const r=await fetch('/api/ops/'+id,{method:'DELETE',headers:{'X-Profile':PROFILE}});const b=await r.json().catch(()=>({}));if(!r.ok||b.ok===false)throw new Error(b.error||'DELETE '+r.status);return true;},
  async putSettings(s){const r=await fetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json','X-Profile':PROFILE},body:JSON.stringify(s)});const b=await r.json().catch(()=>({}));if(!r.ok||b.ok===false)throw new Error(b.error||'PUT settings');return b.settings;},
  async reset(){const r=await fetch('/api/admin/reset',{method:'POST',headers:{'X-Profile':PROFILE}});const b=await r.json().catch(()=>({}));if(!r.ok||b.ok===false)throw new Error(b.error||'reset');return b.ops;},
};

function isProd(){return PROFILE!=='planeador';}
function setConn(s,msg){const c=document.getElementById('conn');c.className='conn-chip '+s;c.textContent=msg;}
let _tt;function toast(msg,kind){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(kind==='err'?'err':'ok');t.style.display='block';clearTimeout(_tt);_tt=setTimeout(()=>t.style.display='none',kind==='err'?4500:2500);}

/* ---------------- capacidade / turno ---------------- */
function capOf(linha){const c=(SETTINGS.capacidades||{})[linha];return c&&c.krH?c.krH:17000;}
function tipoOf(linha){const c=(SETTINGS.capacidades||{})[linha];return c&&c.tipo?c.tipo:'DSL';}
function durHoras(op){const kr=capOf(op.linha);let q=(+op.qtd||0);if(op.desdobrar)q+=(+op.qtdDesdobramento||0);let h=kr>0?q*1000/kr:0;const atr=hm2min(op.tempoAtraso);if(atr)h+=atr/60;return h;}
function turnoWindow(turno){const t=(SETTINGS.turnos||{})[turno]||(SETTINGS.turnos||{})[1]||{ini:'08:00',fim:'17:00',almocoIni:'12:00',almocoFim:'13:00'};return t;}
function dayOverride(d){return (SETTINGS.turnosPorDia||{})[dateKey(d)]||null;}
function isDayClosed(d){const o=dayOverride(d);if(o&&o.fechado)return true;const dow=(d.getDay()+6)%7;if(dow===6&&SETTINGS.domingoFechado)return true;return false;}

function breaksOf(turno){const t=turnoWindow(turno);const b=[];if(t.almocoIni&&t.almocoFim)b.push([hm2min(t.almocoIni),hm2min(t.almocoFim)]);if(t.jantarIni&&t.jantarFim)b.push([hm2min(t.jantarIni),hm2min(t.jantarFim)]);return b;}

// nº de turnos da linha NUM DIA (1 ou 2) — definido no quadro (settings.turnosDia)
// 0 = linha fechada nesse dia; 1 ou 2 turnos
function lineTurnoForDate(l,d){const td=(SETTINGS.turnosDia||{})[dateKey(d)];const v=td&&td[l];if(v===0||v==='0')return 0;return (v===2||v==='2')?2:1;}
function dDate(o){const m=(o.weekKey||'').match(/(\d+)-W(\d+)/);if(!m)return null;const j=new Date(+m[1],0,4);const mon=mondayOf(j);mon.setDate(mon.getDate()+(+m[2]-1)*7+(+o.diaIdx||0));mon.setHours(0,0,0,0);return mon;}
function cmpDay(a,b){const ka=dateKey(a),kb=dateKey(b);return ka<kb?-1:ka>kb?1:0;}
// Janela útil do dia para a linha (min). null = dia fechado/sem capacidade.
function dayWindowFor(l,d){
  if(isDayClosed(d))return null;
  if(lineTurnoForDate(l,d)===0)return null;   // linha fechada nesse dia
  const ov=dayOverride(d);const dow=(d.getDay()+6)%7;let ini,fim,breaks;
  if(dow===5){ini=hm2min(SETTINGS.sabadoIni||'07:00');fim=hm2min(SETTINGS.sabadoFim||'11:00');breaks=[];}
  else{const tno=lineTurnoForDate(l,d);const t=turnoWindow(tno);ini=hm2min(t.ini);fim=hm2min(t.fim);if(fim<=ini)fim+=1440;breaks=breaksOf(tno);}
  if(ov&&ov.ini)ini=hm2min(ov.ini);
  if(ov&&ov.fim){fim=hm2min(ov.fim);if(fim<=ini)fim+=1440;}
  return {ini,fim,breaks};
}
// minutos de trabalho disponíveis a partir de 'start' até ao fim do turno (descontando pausas)
function workCapacity(start,breaks,winFim){let cap=winFim-start;for(const b of breaks){const s=Math.max(b[0],start),e=Math.min(b[1],winFim);if(e>s)cap-=(e-s);}return Math.max(0,cap);}
// relógio de fim após 'work' minutos de trabalho a partir de 'start', absorvendo as pausas
function spanEnd(start,work,breaks,winFim){let t=start,left=work,g=0;while(left>0.0001&&t<winFim&&g++<60){const ib=breaks.find(b=>t>=b[0]&&t<b[1]);if(ib){t=ib[1];continue;}let nb=null;for(const b of breaks)if(t<b[0]&&(nb===null||b[0]<nb))nb=b[0];const stop=Math.min(winFim,nb===null?winFim:nb);const chunk=Math.min(left,stop-t);t+=chunk;left-=chunk;if(left>0.0001){const bb=breaks.find(b=>b[0]===t);if(bb)t=bb[1];else break;}}return t;}
// Escalona TODA a linha cronologicamente, 1 segmento por dia, transitando para o
// dia seguinte quando o turno esgota. { 'YYYY-MM-DD': [ {op,startMin,endMin,qtdSeg,partIdx,total,multiDay} ] }
const _schedCache={};
function scheduleLine(l){
  if(_schedCache[l])return _schedCache[l];
  const orders=DATA.filter(o=>o.linha===l&&o.weekKey&&dDate(o))
    .sort((a,b)=>cmpDay(dDate(a),dDate(b))||((+a.sortIdx||0)-(+b.sortIdx||0)));
  const segs={};const setup=+SETTINGS.setupMin||0;
  const push=(date,op,s,e,q)=>{const k=dateKey(date);(segs[k]=segs[k]||[]).push({op,startMin:s,endMin:e,qtdSeg:q,date:new Date(date)});};
  const nextOpen=(date)=>{let d=new Date(date);for(let i=0;i<500;i++){d.setDate(d.getDate()+1);if(dayWindowFor(l,d))return d;}return null;};
  let curDate=null,curMin=0;
  for(const op of orders){
    let startDay=dDate(op),w=dayWindowFor(l,startDay);
    while(!w){startDay=nextOpen(startDay);if(!startDay)break;w=dayWindowFor(l,startDay);}
    if(!startDay)continue;
    if(curDate===null||cmpDay(curDate,startDay)<0){curDate=startDay;curMin=dayWindowFor(l,curDate).ini;}
    else curMin+=setup;
    const _manual=hm2min(op.hInicioP);   // início manual força a hora nesse dia
    if(_manual!=null){const win0=dayWindowFor(l,startDay);if(win0){curDate=startDay;curMin=Math.min(Math.max(_manual,win0.ini),win0.fim-1);}}
    let remMin=durHoras(op)*60;const totalDur=remMin||1;const totalQtd=(+op.qtd||0);let guard=0;
    while(remMin>0.01&&guard++<800){
      let win=dayWindowFor(l,curDate);
      if(!win){const nd=nextOpen(curDate);if(!nd)break;curDate=nd;curMin=dayWindowFor(l,curDate).ini;continue;}
      if(curMin<win.ini)curMin=win.ini;
      for(const br of win.breaks)if(curMin>=br[0]&&curMin<br[1])curMin=br[1];
      if(curMin>=win.fim){const nd=nextOpen(curDate);if(!nd)break;curDate=nd;curMin=dayWindowFor(l,curDate).ini;continue;}
      const cap=workCapacity(curMin,win.breaks,win.fim);
      if(cap<=0){const nd=nextOpen(curDate);if(!nd)break;curDate=nd;curMin=dayWindowFor(l,curDate).ini;continue;}
      const work=Math.min(remMin,cap);const segEnd=spanEnd(curMin,work,win.breaks,win.fim);
      push(curDate,op,curMin,segEnd,totalQtd*(work/totalDur));
      remMin-=work;
      if(remMin>0.01){const nd=nextOpen(curDate);if(!nd)break;curDate=nd;curMin=dayWindowFor(l,curDate).ini;}
      else curMin=segEnd;
    }
  }
  const byOp={};Object.values(segs).flat().forEach(s=>{(byOp[s.op.id]=byOp[s.op.id]||[]).push(s);});
  Object.values(byOp).forEach(list=>{
    list.sort((a,b)=>a.date-b.date||a.startMin-b.startMin);
    const days=new Set(list.map(s=>dateKey(s.date)));
    list.forEach((s,i)=>{s.partIdx=i+1;s.total=list.length;s.multiDay=days.size>1;
      s.carriedNext=list.slice(i+1).reduce((a,x)=>a+(+x.qtdSeg||0),0);}); // qtd que transita p/ dias seguintes
  });
  _schedCache[l]=segs;return segs;
}
function clearSchedCache(){for(const k in _schedCache)delete _schedCache[k];}

function onTimeInfo(op,endPlanMin){
  if(!op.hFimR)return null;
  const r=hm2min(op.hFimR); if(r==null)return null;
  let rp=r; if(rp<endPlanMin-12*60)rp+=24*60;
  return rp-endPlanMin;
}

/* ---------------- POOL ---------------- */
function matchesSearch(o){const v=SEARCH.v.trim().toLowerCase();if(!v)return true;return [o.dsl,o.lote,o.cliente,o.produtoEntrada,o.obs].some(x=>(x||'').toLowerCase().includes(v));}
// valor "vazio" inclui '0' e erros do Excel (#NAME?, #REF!, #VALUE!, #N/A, #DIV/0!…)
function blankVal(x){x=String(x==null?'':x).trim();return (!x||x==='0'||/^#[A-Z0-9_\/]+[!?]?$/i.test(x))?'':x;}
// ordem "real": tem DSL/lote/produto válidos ou quantidade — exclui linhas vazias/erro da extração
function isRealOrder(o){return !!(blankVal(o.dsl)||blankVal(o.lote)||blankVal(o.produtoEntrada))||(+o.qtd>0);}
function cardHTML(o,hit){
  const desd=o.desdobrar?'<span class="badge desd">DESD</span>':'';
  const urg=/urg|encomenda/i.test(o.obs||'')?'<span class="badge urg">URG</span>':'';
  return `<div class="card${hit?' search-hit':''}" draggable="true" data-id="${o.id}" data-est="${o.estado}">
    <div class="c-top"><span class="c-dsl">${o.dsl||o.lote||'—'}</span><span class="c-qtd">${Math.round((+o.qtd||0)*1000)} un</span></div>
    <div class="c-prod" title="${(o.produtoEntrada||'').replace(/"/g,'')}">${o.produtoEntrada||''}</div>
    <div class="c-meta"><span>${o.cliente||''}</span><span class="badge">${o.calibre||''}</span>${o.qualidades?`<span class="badge">${o.qualidades}</span>`:''}${desd}${urg}</div>
  </div>`;
}
function renderPool(){
  const el=document.getElementById('pool');
  const searching=!!SEARCH.v.trim();
  const all=DATA.filter(o=>!o.linha&&isRealOrder(o));
  const pend=all.filter(matchesSearch);
  let html=`<h3>Kanban · novas ordens (${searching?pend.length+'/'+all.length:all.length})</h3>`;
  html+=pend.map(o=>cardHTML(o,searching)).join('')||'<div class="mini" style="padding:8px">'+(searching?'Sem matches no Kanban.':'Sem ordens por planear.')+'</div>';
  el.innerHTML=html;
  el.querySelectorAll('.card').forEach(c=>bindCardDrag(c));
  el.ondragover=e=>{e.preventDefault();el.style.background='#fbf6ee';};
  el.ondragleave=()=>{el.style.background='';};
  el.ondrop=e=>{e.preventDefault();el.style.background='';if(dragOp&&!isProd())moveToPool(dragOp);};
}

function render(){
  clearSchedCache();
  renderTabs();renderLegend();
  const wrap=document.getElementById('wrap');
  const wb=document.getElementById('weekbar');
  if(ACTIVE_TAB==='cfg'){wrap.classList.add('full');document.getElementById('pool').style.display='none';wb.style.display='none';renderCfg();document.body.classList.toggle('producao',isProd());return;}
  wb.style.display='flex';wrap.classList.remove('full');document.getElementById('pool').style.display='block';
  document.getElementById('wkLabel').textContent=monthLabel();
  const n=opCountForMonth();const oc=document.getElementById('opcount');if(oc)oc.textContent=n+(n===1?' OP':' OPs');
  renderPool();renderBoard();
  document.body.classList.toggle('producao',isProd());
}
function monthLabel(){return `${MESES_PT[ANCHOR.getMonth()]} ${ANCHOR.getFullYear()}`;}
function opMonthDate(o){if(!o.linha||!o.weekKey)return null;const m=o.weekKey.match(/(\d+)-W(\d+)/);if(!m)return null;const j=new Date(+m[1],0,4);const mon=mondayOf(j);mon.setDate(mon.getDate()+(+m[2]-1)*7+(+o.diaIdx||0));return new Date(mon.getFullYear(),mon.getMonth(),1);}
function opCountForMonth(){const y=ANCHOR.getFullYear(),mo=ANCHOR.getMonth();return DATA.filter(o=>{if(!ALL_LINES.includes(o.linha)||!o.weekKey)return false;const m=o.weekKey.match(/(\d+)-W(\d+)/);if(!m)return false;const j=new Date(+m[1],0,4);const mon=mondayOf(j);mon.setDate(mon.getDate()+(+m[2]-1)*7+(+o.diaIdx||0));return mon.getFullYear()===y&&mon.getMonth()===mo;}).length;}
function diaIdxOf(d){return (d.getDay()+6)%7;}

function renderSearchBar(el){
  const term=SEARCH.v.trim();if(!term)return;
  const matches=DATA.filter(matchesSearch);
  const curKey=ANCHOR.getFullYear()*12+ANCHOR.getMonth();
  const byMonth={};let kb=0;
  matches.forEach(o=>{const md=opMonthDate(o);if(!md){kb++;return;}const k=md.getFullYear()*12+md.getMonth();(byMonth[k]=byMonth[k]||{d:md,n:0}).n++;});
  const curN=(byMonth[curKey]&&byMonth[curKey].n)||0;
  const bar=document.createElement('div');bar.className='search-bar';
  bar.innerHTML=`🔎 <b>"${term.replace(/</g,'&lt;')}"</b> — ${matches.length} resultado(s) · ${curN} neste mês${kb?`, ${kb} no Kanban`:''}${Object.keys(byMonth).length?' · saltar para: ':''}`;
  Object.values(byMonth).sort((a,b)=>a.d-b.d).forEach(x=>{
    const k=x.d.getFullYear()*12+x.d.getMonth();
    const chip=document.createElement('span');chip.className='mchip'+(k===curKey?' cur':'');
    chip.textContent=`${MESES_PT[x.d.getMonth()]} ${String(x.d.getFullYear()).slice(2)}: ${x.n}`;
    chip.onclick=()=>{ANCHOR=new Date(x.d);render();};
    bar.appendChild(chip);
  });
  el.appendChild(bar);
}

        <col style="width:50px"><col style="width:50px"><col style="width:46px"><col style="width:50px"><col style="width:56px"><col style="width:56px"><col style="width:54px"><col style="width:44px"></colgroup>
        <thead><tr>

        <th>Início</th><th>Fim</th><th>Dur</th><th>Atraso</th><th>Início real</th><th>Real fim</th><th>QV</th><th>Desd.</th></tr></thead><tbody>`;

        inner+=`<tr class="row${o.desdobrar?' desd':''}${hit?' search-hit':''}${r.multiDay?' cont':''}${newDay?' day-start':''}" data-id="${o.id}">

          <td class="mini${newDay?' dnew':''}">${newDay?`${DIAS_PT[dia]} ${pad(r.date.getDate())}/${pad(r.date.getMonth()+1)}`:''}</td>

      const sel=tr.querySelector('.est-sel');sel.addEventListener('change',()=>changeEstado(+sel.dataset.id,sel.value));

  }catch(e){console.error('renderBoard linha',l,e);const b=document.createElement('div');b.className='line-block';b.innerHTML=`<div class="line-block-head">${lineLabel(l)}</div><div class="empty" style="padding:8px;color:#b91c1c">Erro a desenhar esta linha (ver consola).</div>`;el.appendChild(b);}

/* ---------------- drag & drop ---------------- */
function bindCardDrag(c){
  c.addEventListener('dragstart',e=>{dragOp=DATA.find(x=>x.id==c.dataset.id);c.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  c.addEventListener('dragend',()=>c.classList.remove('dragging'));
  c.addEventListener('click',()=>openModal(+c.dataset.id));
}
function bindZone(zone){
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-target');});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag-target'));
  zone.addEventListener('drop',e=>{
    e.preventDefault();zone.classList.remove('drag-target');
    if(!dragOp||isProd())return;
    if(e.target.closest('tr.row'))return;
    moveToDate(dragOp,zone.dataset.linha,zone.dataset.date);
  });
}
function bindRowReorder(tr){
  tr.addEventListener('dragover',e=>{if(!dragOp||isProd())return;e.preventDefault();const rect=tr.getBoundingClientRect();const below=(e.clientY-rect.top)>rect.height/2;tr.classList.toggle('drop-below',below);tr.classList.toggle('drop-above',!below);});
  tr.addEventListener('dragleave',()=>{tr.classList.remove('drop-below','drop-above');});
  tr.addEventListener('drop',e=>{
    e.preventDefault();const below=tr.classList.contains('drop-below');tr.classList.remove('drop-below','drop-above');
    if(!dragOp||isProd())return;const target=DATA.find(x=>x.id==tr.dataset.id);if(!target||target.id===dragOp.id)return;
    moveRelative(dragOp,target,below?'below':'above');
  });
}

function reindex(linha,wk,dia){
  DATA.filter(o=>o.linha===linha&&o.weekKey===wk&&(+o.diaIdx||0)===dia)
      .sort((a,b)=>(+a.sortIdx||0)-(+b.sortIdx||0))
      .forEach((o,i)=>o.sortIdx=i);
}
async function moveToDate(op,linha,dateStr){
  snapshot();
  const d=new Date(dateStr+'T00:00:00');const wk=weekKeyOf(mondayOf(d));const dia=diaIdxOf(d);
  const oldL=op.linha,oldW=op.weekKey,oldD=+op.diaIdx||0;
  op.linha=linha;op.weekKey=wk;op.diaIdx=dia;
  const peers=DATA.filter(o=>o.linha===linha&&o.weekKey===wk&&(+o.diaIdx||0)===dia&&o.id!==op.id);
  op.sortIdx=peers.length;
  if(oldL)reindex(oldL,oldW,oldD);reindex(linha,wk,dia);
  render();await persist(op);
}
async function moveToPool(op){
  snapshot();
  const oldL=op.linha,oldW=op.weekKey,oldD=+op.diaIdx||0;
  op.linha='';op.weekKey='';op.diaIdx=0;op.sortIdx=0;op.estado=ESTADO_POOL;
  if(oldL)reindex(oldL,oldW,oldD);
  render();await persist(op);
}
async function moveRelative(op,target,pos){
  snapshot();
  const wk=target.weekKey,linha=target.linha,dia=+target.diaIdx||0;
  op.linha=linha;op.weekKey=wk;op.diaIdx=dia;
  const list=DATA.filter(o=>o.linha===linha&&o.weekKey===wk&&(+o.diaIdx||0)===dia&&o.id!==op.id)
                 .sort((a,b)=>(+a.sortIdx||0)-(+b.sortIdx||0));
  const ti=list.findIndex(o=>o.id===target.id);
  const at=pos==='below'?ti+1:ti;list.splice(at,0,op);
  list.forEach((o,i)=>o.sortIdx=i);
  render();await persist(op);
}
async function changeEstado(id,val){const op=DATA.find(o=>o.id===id);if(!op)return;snapshot();op.estado=val;render();await persist(op);}
async function changeBancaTapete(id,val){const op=DATA.find(o=>o.id===id);if(!op)return;snapshot();op.bancaTapete=val;render();await persist(op);}
async function changeTurnoDia(dateStr,linha,turno){
  SETTINGS.turnosDia=SETTINGS.turnosDia||{};
  SETTINGS.turnosDia[dateStr]=Object.assign({},SETTINGS.turnosDia[dateStr]);
  SETTINGS.turnosDia[dateStr][linha]=turno;
  render();
  try{setConn('loading','a guardar…');await Api.putSettings({turnosDia:SETTINGS.turnosDia});setConn('ok','ligado');}
  catch(e){setConn('error','erro');toast('Falha ao guardar turno: '+e.message,'err');}
}

/* ---------------- persistência ---------------- */
async function persist(op){
  try{setConn('loading','a guardar…');const saved=await Api.putOp(op.id,op);Object.assign(op,saved);setConn('ok','ligado');}
  catch(e){setConn('error','erro');toast('Falha ao guardar: '+e.message,'err');}
}

/* ---------------- modal ---------------- */
function fld(label,id,val,opts){val=val==null?'':val;opts=opts||{};const dis=opts.prodLock&&isProd()?'disabled':'';
  if(opts.type==='select'){return `<div class="fld"><label>${label}</label><select id="${id}" ${dis}>${opts.options.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;}
  if(opts.type==='textarea'){return `<div class="fld" style="grid-column:1/-1"><label>${label}</label><textarea id="${id}" rows="2" ${dis}>${val}</textarea></div>`;}
  if(opts.type==='check'){return `<div class="fld"><label>${label}</label><select id="${id}" ${dis}><option value="false" ${!val?'selected':''}>Não</option><option value="true" ${val?'selected':''}>Sim</option></select></div>`;}
  if(opts.type==='time'){const v=/^\d{1,2}:\d{2}/.test(String(val))?String(val).slice(0,5):'';return `<div class="fld"><label>${label}</label><input type="time" id="${id}" value="${v}" ${dis}></div>`;}
  return `<div class="fld"><label>${label}</label><input id="${id}" value="${String(val).replace(/"/g,'&quot;')}" ${dis}></div>`;}

function openModal(id){
  editingId=id;const o=id?DATA.find(x=>x.id===id):blankOp();
  document.getElementById('modalTitle').textContent=id?`Editar ordem ${o.dsl||o.lote||''}`:'Nova ordem';
  document.getElementById('btnDelete').style.display=id?'':'none';
  const allLines=['',...LINHAS_1_5,...LINHAS_6_10,...ESPECIAIS];
  const body=`
   <div class="sec-title">Identificação</div>
   <div class="grid3">
     ${fld('OP DSL','f_dsl',o.dsl,{prodLock:true})}
     ${fld('Lote','f_lote',o.lote)}
     ${fld('Cliente','f_cliente',o.cliente,{prodLock:true})}
     ${fld('Produto entrada','f_prod',o.produtoEntrada,{prodLock:true})}
     <div class="fld"><label>Calibre (auto)</label><input id="f_cal" value="${String(o.calibre||'').replace(/"/g,'&quot;')}" readonly title="Preenchido automaticamente pelo Produto"></div>
     ${fld('Qualidades','f_qual',o.qualidades,{prodLock:true})}
     <div class="fld"><label>Qtd (unidades)</label><input id="f_qtd" type="number" step="1" value="${Math.round((+o.qtd||0)*1000)}" ${isProd()?'disabled':''}></div>
     <div class="fld"><label>Qtd objetivo</label><input id="f_qtdnec" type="number" step="1" value="${Math.round((+o.qtdNecessaria||0)*1000)}" ${isProd()?'disabled':''}></div>
     ${fld('Início manual (forçar)','f_hini',o.hInicioP,{type:'time',prodLock:true})}
     ${fld('Observações','f_obs',o.obs,{type:'textarea'})}
   </div>
   <div class="sec-title">Desdobramento / 2ª passagem</div>
   <div class="grid3">
     ${fld('Desdobra?','f_desd',o.desdobrar,{type:'check',prodLock:true})}
     <div class="fld"><label>Qtd desdobramento (unidades)</label><input id="f_qdesd" type="number" step="1" value="${Math.round((+o.qtdDesdobramento||0)*1000)}"></div>
     ${fld('Qtd prevista desd.','f_qpdesd',o.qtdPrevistaDesd,{prodLock:true})}
     ${fld('Motivo 2ª passagem','f_mot',o.motivo2aPassagem)}
     ${fld('Causa raiz','f_causa',o.causaRaiz2a)}
   </div>
   <div class="sec-title">QV</div>
   <div class="grid3">
     ${fld('QV up (Plan)','f_qvup',o.qvUpPlan,{prodLock:true})}
     ${fld('QV (Plan)','f_qv',o.qvPlan,{prodLock:true})}
     ${fld('QV down (Plan)','f_qvdn',o.qvDownPlan,{prodLock:true})}
     ${fld('QV up (DSL)','f_qvupd',o.qvUpDsl)}
     ${fld('QV (DSL)','f_qvd',o.qvDsl)}
     ${fld('QV down (DSL)','f_qvdnd',o.qvDownDsl)}
     ${fld('Próximo passo','f_prox',o.proximoPasso,{prodLock:true})}
   </div>
   <div class="sec-title">Execução (Produção)</div>
   <div class="grid3">
     ${fld('Início real','f_hir',o.hInicioR,{type:'time'})}
     ${fld('Fim real','f_hfr',o.hFimR,{type:'time'})}
     ${fld('Tempo atraso (soma ao tempo da ordem)','f_atr',o.tempoAtraso,{type:'time'})}
     ${fld('Qtd real','f_qreal',o.qtdReal)}
     ${fld('Colaborador','f_colab',o.colaborador)}
   </div>`;
  document.getElementById('modalBody').innerHTML=body;
  // preenchimento automático de calibre + qualidade a partir do Produto
  const pe=document.getElementById('f_prod');
  if(pe&&!isProd()){pe.addEventListener('input',()=>{const v=pe.value;const c=document.getElementById('f_cal');const q=document.getElementById('f_qual');if(c)c.value=calibreFrom(v);if(q)q.value=qualidadeFrom(v);});}
  document.getElementById('modalBg').classList.add('show');
}
function blankOp(){return{dsl:'',lote:'',cliente:'',produtoEntrada:'',calibre:'',qualidades:'',linha:'',turno:1,estado:'Aberto',qtd:0,qtdNecessaria:0,hInicioP:'',inicioMode:'auto',desdobrar:false,qtdDesdobramento:0,desdPrevisto:0,qtdPrevistaDesd:0,motivo2aPassagem:'',causaRaiz2a:'',qvUpPlan:'',qvPlan:'',qvDownPlan:'',qvUpDsl:'',qvDsl:'',qvDownDsl:'',qv1Dsl:'',proximoPasso:'',hInicioR:'',hFimR:'',tempoAtraso:'',qtdReal:0,qtdSeguinte:0,temposPerdidosAvaria:'',faltas:'',colaborador:'',obs:'',bancaTapete:'',weekKey:'',diaIdx:0,sortIdx:0};}
function gv(id){const e=document.getElementById(id);return e?e.value:'';}
async function saveModal(){
  // Desdobramento obrigatório quando Desdobra = Sim
  const _curDesd=editingId?((DATA.find(x=>x.id===editingId)||{}).desdobrar):false;
  const _willDesd=isProd()?_curDesd:(gv('f_desd')==='true');
  if(_willDesd && !((+gv('f_qdesd')||0)>0)){toast('Qtd desdobramento é obrigatória quando Desdobra = Sim.','err');return;}
  snapshot();
  const o=editingId?Object.assign({},DATA.find(x=>x.id===editingId)):blankOp();
  const set=(k,v)=>{o[k]=v;};
  if(!isProd()){
    const prod=gv('f_prod');
    set('dsl',gv('f_dsl'));set('cliente',gv('f_cliente'));set('produtoEntrada',prod);
    set('calibre',calibreFrom(prod)||gv('f_cal'));set('qualidades',gv('f_qual')||qualidadeFrom(prod));
    set('qtd',(+gv('f_qtd')||0)/1000);set('qtdNecessaria',(+gv('f_qtdnec')||0)/1000); // input em unidades -> guardado em milhares
    set('hInicioP',gv('f_hini'));   // início manual (forçar); vazio = automático
    set('desdobrar',gv('f_desd')==='true');set('qtdPrevistaDesd',+gv('f_qpdesd')||0);
    set('qvUpPlan',gv('f_qvup'));set('qvPlan',gv('f_qv'));set('qvDownPlan',gv('f_qvdn'));set('proximoPasso',gv('f_prox'));
    // Linha/Turno/Estado/Início geridos no quadro (drag-drop) — não tocados aqui.
  }
  set('lote',gv('f_lote'));
  set('qtdDesdobramento',(+gv('f_qdesd')||0)/1000);set('motivo2aPassagem',gv('f_mot'));set('causaRaiz2a',gv('f_causa'));
  set('qvUpDsl',gv('f_qvupd'));set('qvDsl',gv('f_qvd'));set('qvDownDsl',gv('f_qvdnd'));
  set('hInicioR',gv('f_hir'));set('hFimR',gv('f_hfr'));set('tempoAtraso',gv('f_atr'));
  set('qtdReal',+gv('f_qreal')||0);set('colaborador',gv('f_colab'));set('obs',gv('f_obs'));
  const savingId=editingId;            // guardar ANTES de closeModal (que põe editingId=null)
  closeModal();
  try{
    setConn('loading','a guardar…');
    if(savingId){const s=await Api.putOp(savingId,o);Object.assign(DATA.find(x=>x.id===savingId),s);}
    else{const s=await Api.postOp(o);DATA.push(s);}
    setConn('ok','ligado');toast('Guardado.');render();
  }catch(e){setConn('error','erro');toast('Falha: '+e.message,'err');}
}
function closeModal(){document.getElementById('modalBg').classList.remove('show');editingId=null;}
async function deleteCurrent(){if(!editingId)return;if(!confirm('Apagar esta ordem?'))return;snapshot();const id=editingId;closeModal();try{await Api.delOp(id);DATA=DATA.filter(o=>o.id!==id);toast('Apagada.');render();}catch(e){toast('Falha: '+e.message,'err');}}

/* ---------------- Configurações ---------------- */
function renderCfg(){
  const el=document.getElementById('board');
  const caps=SETTINGS.capacidades||{};
  let capRows=ALL_LINES.map(l=>`<tr><td>${lineLabel(l)}</td>
     <td><input id="cap_${l}" type="number" value="${(caps[l]&&caps[l].krH)||(l==='EM'?8500:17000)}" ${isProd()?'disabled':''}></td></tr>`).join('');
  const t1=(SETTINGS.turnos||{})[1]||{},t2=(SETTINGS.turnos||{})[2]||{};
  el.innerHTML=`<div class="cfg">
    <h2>Capacidade por linha (rolhas/h)</h2>
    <table><tr><th>Linha</th><th>Rolhas/h</th></tr>${capRows}</table>
    <p class="mini" style="margin:4px 0 0">Os turnos (1 ou 2) definem-se no quadro, em cada dia/linha.</p>
    <h2>Turnos</h2>
    <table>
      <tr><th>Turno</th><th>Início</th><th>Fim</th><th>Almoço</th><th>Jantar</th></tr>
      <tr><td>1 (dia)</td><td><input id="t1ini" value="${t1.ini||'08:00'}" ${isProd()?'disabled':''}></td><td><input id="t1fim" value="${t1.fim||'17:00'}" ${isProd()?'disabled':''}></td>
          <td><input id="t1ai" value="${t1.almocoIni||'12:00'}" ${isProd()?'disabled':''}>–<input id="t1af" value="${t1.almocoFim||'13:00'}" ${isProd()?'disabled':''}></td><td>—</td></tr>
      <tr><td>2 (noite)</td><td><input id="t2ini" value="${t2.ini||'17:00'}" ${isProd()?'disabled':''}></td><td><input id="t2fim" value="${t2.fim||'01:00'}" ${isProd()?'disabled':''}></td>
          <td>—</td>
          <td><input id="t2ji" value="${t2.jantarIni||'20:30'}" ${isProd()?'disabled':''}>–<input id="t2jf" value="${t2.jantarFim||'21:30'}" ${isProd()?'disabled':''}></td></tr>
    </table>
    <h2>Geral</h2>
    <table><tr><th>Setup entre ordens (min)</th><td><input id="setupMin" type="number" value="${SETTINGS.setupMin||10}" ${isProd()?'disabled':''}></td></tr></table>
    <div style="margin-top:14px"><button class="primary planner-only" id="btnSaveCfg">Guardar configurações</button></div>
  </div>`;
  const b=document.getElementById('btnSaveCfg');if(b)b.onclick=saveCfg;
}
async function saveCfg(){
  const caps={};ALL_LINES.forEach(l=>{caps[l]={krH:+gv('cap_'+l)||(l==='EM'?8500:17000)};});
  const turnos={1:{ini:gv('t1ini'),fim:gv('t1fim'),almocoIni:gv('t1ai'),almocoFim:gv('t1af')},
                2:{ini:gv('t2ini'),fim:gv('t2fim'),jantarIni:gv('t2ji'),jantarFim:gv('t2jf')}}; // T2 só jantar
  const payload={capacidades:caps,turnos:turnos,setupMin:+gv('setupMin')||10};
  try{const s=await Api.putSettings(payload);Object.assign(SETTINGS,s);toast('Configurações guardadas.');render();}
  catch(e){toast('Falha: '+e.message,'err');}
}

/* ---------------- Export Excel ---------------- */
function exportExcel(){
  clearSchedCache();
  const board=BOARDS[ACTIVE_TAB]||BOARDS.plan;const rows=[];
  const year=ANCHOR.getFullYear(),month=ANCHOR.getMonth();
  board.lines.forEach(l=>{const segs=scheduleLine(l);
    Object.keys(segs).forEach(dk=>{const d=new Date(dk+'T00:00:00');if(d.getFullYear()!==year||d.getMonth()!==month)return;
      segs[dk].forEach(r=>{const o=r.op;const isLast=r.partIdx===r.total;
        rows.push({Data:dk,Dia:DIAS_PT[diaIdxOf(d)],Linha:lineLabel(l),Turnos:lineTurnoForDate(l,d),DSL:o.dsl,Produto:o.produtoEntrada,Lote:o.lote,Cliente:o.cliente,
          'Qtd seg':Math.round((+r.qtdSeg||0)*1000),'Qtd total':Math.round((+o.qtd||0)*1000),'Qtd objetivo':Math.round((+o.qtdNecessaria||0)*1000),
          Parte:r.multiDay?`${r.partIdx}/${r.total}`:'',Estado:o.estado,'Inicio':min2hm(r.startMin%1440),'Fim':min2hm(r.endMin%1440),'Dur (h)':+((r.endMin-r.startMin)/60).toFixed(2),
          'Atraso':o.tempoAtraso||'','Inicio real':isLast?(o.hInicioR||''):'','Fim real':isLast?(o.hFimR||''):'',Desdobra:o.desdobrar?'Sim':'',
          'Qtd desd':+o.qtdDesdobramento||0,'Motivo 2a':o.motivo2aPassagem||'',QV:o.qvDsl||o.qvPlan||'',OBS:o.obs||''});});});});
  rows.sort((a,b)=>a.Data<b.Data?-1:a.Data>b.Data?1:(a.Linha<b.Linha?-1:1));
  if(!rows.length){toast('Sem ordens neste mês.','err');return;}
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Plano');
  XLSX.writeFile(wb,`Planeamento_DSL_${ANCHOR.getFullYear()}-${pad(ANCHOR.getMonth()+1)}.xlsx`);
}

/* ---------------- perfil / boot ---------------- */
function applyProfile(){document.getElementById('profileSel').value=PROFILE;document.body.classList.toggle('producao',isProd());updateUndoBtn();}
function changeProfile(v){
  // Password desativada temporariamente — alternância direta de perfil.
  PROFILE=v;localStorage.setItem('dsl_profile',v);applyProfile();render();
}
async function loadState(){
  try{setConn('loading','a carregar…');const st=await Api.getState();DATA=st.ops||[];SETTINGS=st.settings||{};
    if(!ANCHOR){const today=new Date();ANCHOR=new Date(today.getFullYear(),today.getMonth(),1);
      const hasMonth=d=>DATA.some(o=>{if(!o.linha||!o.weekKey)return false;const m=o.weekKey.match(/(\d+)-W(\d+)/);if(!m)return false;const j=new Date(+m[1],0,4);const mon=mondayOf(j);mon.setDate(mon.getDate()+(+m[2]-1)*7+(+o.diaIdx||0));return mon.getFullYear()===d.getFullYear()&&mon.getMonth()===d.getMonth();});
      if(!hasMonth(ANCHOR)){
        // saltar para o mês com ordens mais recente
        let best=null;DATA.forEach(o=>{if(!o.linha||!o.weekKey)return;const m=o.weekKey.match(/(\d+)-W(\d+)/);if(!m)return;const j=new Date(+m[1],0,4);const mon=mondayOf(j);mon.setDate(mon.getDate()+(+m[2]-1)*7+(+o.diaIdx||0));const key=mon.getFullYear()*12+mon.getMonth();if(best===null||key>best.key)best={key,d:new Date(mon.getFullYear(),mon.getMonth(),1)};});
        if(best)ANCHOR=best.d;
      }}
    setConn('ok','ligado');render();
  }catch(e){setConn('error','sem ligação');toast('Falha ao carregar: '+e.message,'err');DATA=[];SETTINGS={};if(!ANCHOR){const t=new Date();ANCHOR=new Date(t.getFullYear(),t.getMonth(),1);}render();}
}

document.getElementById('profileSel').addEventListener('change',e=>changeProfile(e.target.value));
document.getElementById('btnUndo').addEventListener('click',doUndo);
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'&&!isProd()&&!document.getElementById('modalBg').classList.contains('show')){e.preventDefault();doUndo();}});
document.getElementById('btnNew').addEventListener('click',()=>openModal(null));
document.getElementById('btnExport').addEventListener('click',exportExcel);
document.getElementById('btnReset').addEventListener('click',async()=>{if(!confirm('Repor todas as ordens do seed inicial? Isto apaga alterações.'))return;try{DATA=await Api.reset();toast('Reposto.');render();}catch(e){toast('Falha: '+e.message,'err');}});
document.getElementById('btnSave').addEventListener('click',saveModal);
document.getElementById('btnCancel').addEventListener('click',closeModal);
document.getElementById('btnDelete').addEventListener('click',deleteCurrent);
// (a janela só fecha com Cancelar ou Guardar — clicar fora não fecha)
document.getElementById('wkPrev').addEventListener('click',()=>{ANCHOR=new Date(ANCHOR.getFullYear(),ANCHOR.getMonth()-1,1);render();});
document.getElementById('wkNext').addEventListener('click',()=>{ANCHOR=new Date(ANCHOR.getFullYear(),ANCHOR.getMonth()+1,1);render();});
document.getElementById('wkToday').addEventListener('click',()=>{const t=new Date();ANCHOR=new Date(t.getFullYear(),t.getMonth(),1);render();});
document.getElementById('search').addEventListener('input',e=>{SEARCH.v=e.target.value;render();});

applyProfile();
loadState();
setInterval(()=>{if(document.getElementById('modalBg').classList.contains('show'))return;Api.getState().then(st=>{DATA=st.ops||[];SETTINGS=st.settings||{};setConn('ok','ligado');render();}).catch(()=>setConn('error','sem ligação'));},30000);
</script>
